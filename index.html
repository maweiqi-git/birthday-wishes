<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亲爱的，生日快乐 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 25%, #fce4ec 50%, #fff3e0 75%, #f3e5f5 100%);
      background-size: 400% 400%;
      animation: bgShift 20s ease infinite;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    /* Floating sparkles */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: sparkleFloat var(--dur) ease-in-out var(--delay) infinite;
    }
    @keyframes sparkleFloat {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg) scale(0); opacity: 0; }
    }

    /* Floating hearts */
    .hearts-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .floating-heart {
      position: absolute;
      bottom: -30px;
      font-size: var(--size);
      animation: heartRise var(--dur) ease-in var(--delay) infinite;
      opacity: 0.35;
    }
    @keyframes heartRise {
      0% { transform: translateY(0) translateX(0) rotate(0deg); }
      25% { transform: translateY(-25vh) translateX(20px) rotate(10deg); }
      50% { transform: translateY(-50vh) translateX(-15px) rotate(-5deg); }
      75% { transform: translateY(-75vh) translateX(10px) rotate(8deg); }
      100% { transform: translateY(-105vh) translateX(-20px) rotate(-10deg); }
    }

    /* Rose petals */
    .petals-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .petal {
      position: absolute;
      top: -20px;
      width: var(--size);
      height: calc(var(--size) * 1.4);
      background: var(--color);
      border-radius: 50% 0 50% 0;
      animation: petalFall var(--dur) linear var(--delay) infinite;
      opacity: 0.7;
    }
    @keyframes petalFall {
      0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.8; }
      25% { transform: translateY(25vh) rotate(90deg) translateX(40px); }
      50% { transform: translateY(50vh) rotate(180deg) translateX(-30px); }
      75% { transform: translateY(75vh) rotate(270deg) translateX(20px); opacity: 0.4; }
      100% { transform: translateY(105vh) rotate(360deg) translateX(-40px); opacity: 0; }
    }

    /* Cursor trail */
    .cursor-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 16px;
      animation: trailFade 1s ease-out forwards;
    }
    @keyframes trailFade {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.2) translateY(-30px); }
    }

    /* Main container */
    .main-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      max-width: 650px;
      width: 100%;
    }

    /* Title with typewriter */
    .title-wrapper {
      margin-bottom: 8px;
    }
    .title {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #e91e63, #9c27b0, #e91e63);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGradient 3s ease infinite;
      margin-bottom: 4px;
    }
    .title .cursor {
      display: inline-block;
      width: 3px;
      height: 0.9em;
      background: #e91e63;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @keyframes titleGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      color: #ab47bc;
      letter-spacing: 4px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease forwards;
      animation-delay: 2.5s;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glassmorphism card */
    .glass-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 28px 24px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px rgba(156, 39, 176, 0.12), 0 2px 8px rgba(0,0,0,0.04);
      opacity: 0;
      animation: fadeSlideIn 0.8s ease forwards;
      animation-delay: 3s;
    }
    .glass-card .wish-line {
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      color: #6a1b9a;
      line-height: 2.2;
      letter-spacing: 1px;
    }
    .glass-card .wish-line .emoji-deco {
      display: inline-block;
      animation: bounceEmoji 2s ease infinite;
    }
    .glass-card .wish-line .emoji-deco:nth-child(1) { animation-delay: 0s; }
    .glass-card .wish-line .emoji-deco:nth-child(2) { animation-delay: 0.3s; }
    .glass-card .wish-line .emoji-deco:nth-child(3) { animation-delay: 0.6s; }
    @keyframes bounceEmoji {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Cake */
    .cake-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease forwards;
      animation-delay: 3.5s;
    }
    .cake {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto;
    }
    .cake-layer {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 12px;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 4px 8px rgba(0,0,0,0.08);
    }
    .layer-bottom {
      bottom: 0;
      width: 190px;
      height: 62px;
      background: linear-gradient(180deg, #f8bbd0, #f06292);
      border-radius: 14px 14px 8px 8px;
    }
    .layer-middle {
      bottom: 52px;
      width: 150px;
      height: 52px;
      background: linear-gradient(180deg, #e1bee7, #ba68c8);
      border-radius: 12px 12px 8px 8px;
    }
    .layer-top {
      bottom: 94px;
      width: 110px;
      height: 42px;
      background: linear-gradient(180deg, #ffcdd2, #ef9a9a);
      border-radius: 10px 10px 6px 6px;
    }

    /* Frosting drips */
    .drip {
      position: absolute;
      bottom: -8px;
      width: 14px;
      height: 16px;
      background: inherit;
      border-radius: 50%;
    }
    .d1{left:14px}.d2{left:42px}.d3{left:70px}.d4{left:98px}.d5{left:126px}.d6{left:154px}
    .dm1{left:18px}.dm2{left:48px}.dm3{left:78px}.dm4{left:108px}
    .dt1{left:18px}.dt2{left:48px}.dt3{left:78px}

    /* Cake decorations */
    .cake-deco {
      position: absolute;
      font-size: 10px;
    }

    /* Cream swirl on top */
    .cream-swirl {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
    }

    /* Candles */
    .candles {
      position: absolute;
      bottom: 126px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 2;
    }
    .candle {
      position: relative;
      width: 10px;
      height: 38px;
      border-radius: 5px 5px 2px 2px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .candle:nth-child(1) { background: linear-gradient(180deg, #ff80ab, #f50057); }
    .candle:nth-child(2) { background: linear-gradient(180deg, #b39ddb, #7c4dff); }
    .candle:nth-child(3) { background: linear-gradient(180deg, #80deea, #00bcd4); }
    .candle:nth-child(4) { background: linear-gradient(180deg, #ef9a9a, #f44336); }
    .candle:nth-child(5) { background: linear-gradient(180deg, #fff59d, #ffc107); }

    .candle .flame {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 22px;
      background: radial-gradient(ellipse at center, #fff 15%, #ffd54f 50%, #ff6d00 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.3s ease-in-out infinite alternate;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .candle .flame::after {
      content: '';
      position: absolute;
      top: 5px; left: 50%;
      transform: translateX(-50%);
      width: 9px;
      height: 11px;
      background: radial-gradient(ellipse, #fff, rgba(255,255,255,0.6));
      border-radius: 50%;
    }
    .candle.blown .flame {
      opacity: 0;
      transform: translateX(-50%) scale(0.3);
    }
    @keyframes flicker {
      from { transform: translateX(-50%) rotate(-3deg) scaleY(0.92); }
      to { transform: translateX(-50%) rotate(3deg) scaleY(1.08); }
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease forwards;
      animation-delay: 4s;
    }
    .btn {
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-gift {
      background: linear-gradient(135deg, #f06292, #e91e63);
      color: #fff;
      box-shadow: 0 4px 16px rgba(233, 30, 99, 0.3);
    }
    .btn-gift:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 24px rgba(233, 30, 99, 0.4);
    }
    .btn-letter {
      background: linear-gradient(135deg, #ce93d8, #9c27b0);
      color: #fff;
      box-shadow: 0 4px 16px rgba(156, 39, 176, 0.3);
    }
    .btn-letter:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 24px rgba(156, 39, 176, 0.4);
    }

    /* Envelope reveal */
    .envelope-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .envelope-overlay.show {
      display: flex;
    }
    .envelope {
      position: relative;
      width: 320px;
      max-width: 90vw;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden;
      animation: envelopeIn 0.5s ease-out;
    }
    @keyframes envelopeIn {
      from { transform: scale(0.8) translateY(40px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .envelope-top {
      background: linear-gradient(135deg, #f8bbd0, #f06292);
      padding: 20px;
      text-align: center;
      position: relative;
    }
    .envelope-top .seal {
      display: inline-block;
      font-size: 2.5rem;
      animation: bounceEmoji 1.5s ease infinite;
    }
    .envelope-body {
      padding: 28px 24px;
      text-align: center;
      color: #4a148c;
      font-size: 1.1rem;
      line-height: 2;
    }
    .envelope-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      transition: color 0.2s;
    }
    .envelope-close:hover { color: #fff; }

    /* Audio hint */
    .audio-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 0.85rem;
      color: #ad1457;
      letter-spacing: 1px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.9);
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .audio-hint:hover {
      background: rgba(255,255,255,0.9);
      transform: translateX(-50%) scale(1.03);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 0.95rem;
      color: #ad1457;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      animation: toastIn 0.4s ease, toastOut 0.4s ease 2s forwards;
      pointer-events: none;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @media (max-width: 480px) {
      .cake { transform: scale(0.8); }
      .candles { gap: 10px; bottom: 120px; }
      .glass-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- Sparkles -->
  <div id="sparkles"></div>

  <!-- Floating hearts -->
  <div class="hearts-layer" id="hearts"></div>

  <!-- Rose petals -->
  <div class="petals-layer" id="petals"></div>

  <!-- Main -->
  <div class="main-container">
    <div class="title-wrapper">
      <h1 class="title" id="title"></h1>
    </div>
    <p class="subtitle">✨ Happy Birthday ✨</p>

    <!-- Glass card -->
    <div class="glass-card">
      <p class="wish-line">
        <span class="emoji-deco">🌸</span>
        愿你的每一天都如花般绽放<br>
        愿你被世界温柔以待<br>
        愿你眼里藏着星辰，笑容里带着暖阳<br>
        愿所有美好，都在你身边发生
        <span class="emoji-deco">🌸</span>
      </p>
    </div>

    <!-- Cake -->
    <div class="cake-wrapper">
      <div class="candles" id="candles">
        <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
        <div class="candle" onclick="blowCandle(this)"><div class="flame"></div></div>
      </div>
      <div class="cake">
        <div class="cake-layer layer-top">
          <div class="drip dt1"></div><div class="drip dt2"></div><div class="drip dt3"></div>
        </div>
        <div class="cake-layer layer-middle">
          <div class="drip dm1"></div><div class="drip dm2"></div><div class="drip dm3"></div><div class="drip dm4"></div>
        </div>
        <div class="cake-layer layer-bottom">
          <div class="drip d1"></div><div class="drip d2"></div><div class="drip d3"></div><div class="drip d4"></div><div class="drip d5"></div><div class="drip d6"></div>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-gift" onclick="burstSurprise()">🎁 拆开礼物</button>
      <button class="btn btn-letter" onclick="openLetter()">💌 打开贺卡</button>
    </div>
  </div>

  <!-- Envelope overlay -->
  <div class="envelope-overlay" id="envelopeOverlay" onclick="closeLetter(event)">
    <div class="envelope" onclick="event.stopPropagation()">
      <div class="envelope-top">
        <button class="envelope-close" onclick="closeLetter()">✕</button>
        <span class="seal">💝</span>
      </div>
      <div class="envelope-body">
        亲爱的女孩 👧<br><br>
        今天是你的生日 🎂<br>
        愿这份小小的惊喜能让你嘴角上扬 😊<br><br>
        生日快乐！<br>
        希望你永远被爱包围 💕
      </div>
    </div>
  </div>

  <!-- Audio hint -->
  <div class="audio-hint" onclick="playMusic(event)">🎵 点这里播放生日歌</div>

  <script>
    // === Typewriter ===
    (function typewriter() {
      const el = document.getElementById('title');
      const text = '亲爱的，生日快乐 💕';
      let i = 0;
      el.innerHTML = '<span class="cursor"></span>';
      const cursor = el.querySelector('.cursor');

      function type() {
        if (i < text.length) {
          el.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          setTimeout(type, 100 + Math.random() * 60);
        } else {
          cursor.style.display = 'none';
        }
      }
      setTimeout(type, 400);
    })();

    // === Sparkles ===
    (function createSparkles() {
      const container = document.getElementById('sparkles');
      const emojis = ['✨','⭐','💫','🌟','❀','✿','💖'];
      const frag = document.createDocumentFragment();
      for (let i = 0; i < 30; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.textContent = emojis[i % emojis.length];
        s.style.cssText = `
          left: ${Math.random() * 100}%;
          top: ${80 + Math.random() * 20}%;
          font-size: ${10 + Math.random() * 16}px;
          --dur: ${6 + Math.random() * 10}s;
          --delay: ${Math.random() * 8}s;
        `;
        frag.appendChild(s);
      }
      container.appendChild(frag);
    })();

    // === Floating Hearts ===
    (function createHearts() {
      const container = document.getElementById('hearts');
      const hearts = ['💕','💗','💖','💝','💓','🩷','❤️','💘'];
      const frag = document.createDocumentFragment();
      for (let i = 0; i < 18; i++) {
        const h = document.createElement('div');
        h.className = 'floating-heart';
        h.textContent = hearts[i % hearts.length];
        h.style.cssText = `
          left: ${Math.random() * 95}%;
          --size: ${14 + Math.random() * 22}px;
          --dur: ${8 + Math.random() * 12}s;
          --delay: ${Math.random() * 10}s;
        `;
        frag.appendChild(h);
      }
      container.appendChild(frag);
    })();

    // === Rose Petals ===
    (function createPetals() {
      const container = document.getElementById('petals');
      const colors = ['#f8bbd0','#f48fb1','#f06292','#ec407a','#e91e63','#fce4ec','#f3e5f5','#e1bee7','#ce93d8','#ba68c8'];
      const frag = document.createDocumentFragment();
      for (let i = 0; i < 35; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          --size: ${8 + Math.random() * 14}px;
          --color: ${colors[i % colors.length]};
          --dur: ${7 + Math.random() * 10}s;
          --delay: ${Math.random() * 8}s;
        `;
        frag.appendChild(p);
      }
      container.appendChild(frag);
    })();

    // === Cursor trail ===
    let trailTimeout;
    document.addEventListener('mousemove', function(e) {
      if (trailTimeout) return;
      trailTimeout = setTimeout(() => { trailTimeout = null; }, 50);

      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      trail.textContent = ['💕','✨','💖','🌸'][Math.floor(Math.random() * 4)];
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
      document.body.appendChild(trail);
      setTimeout(() => trail.remove(), 1000);
    });

    // Also on touch
    document.addEventListener('touchmove', function(e) {
      const t = e.touches[0];
      const trail = document.createElement('div');
      trail.className = 'cursor-trail';
      trail.textContent = '💕';
      trail.style.left = t.clientX + 'px';
      trail.style.top = t.clientY + 'px';
      document.body.appendChild(trail);
      setTimeout(() => trail.remove(), 1000);
    }, { passive: true });

    // === Blow candle ===
    let blownCount = 0;
    function blowCandle(el) {
      if (el.classList.contains('blown')) return;
      el.classList.add('blown');
      blownCount++;
      showToast(['许个愿吧~ 🌟','好愿望一定实现！','心想事成！','美梦成真！','全部都会实现的！'][blownCount - 1]);
      if (blownCount === 5) {
        setTimeout(() => {
          showToast('所有蜡烛都吹灭啦！生日快乐！🎉');
          burstConfetti();
        }, 600);
      }
    }

    // === Burst surprise ===
    function burstSurprise() {
      burstConfetti();
      showToast('🎁 礼物来啦！天天开心！');
    }

    // === Confetti burst ===
    function burstConfetti() {
      const body = document.body;
      const colors = ['#e91e63','#9c27b0','#ff4081','#7c4dff','#ff6e40','#00bcd4','#ffc107','#4caf50','#ff5722','#e040fb'];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.style.cssText = `
          position: fixed;
          z-index: 9998;
          pointer-events: none;
          width: ${6 + Math.random() * 12}px;
          height: ${6 + Math.random() * 12}px;
          background: ${colors[i % colors.length]};
          border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
          left: ${30 + Math.random() * 40}%;
          top: ${20 + Math.random() * 30}%;
          animation: confettiBurst ${1.5 + Math.random() * 2}s ease-out forwards;
          animation-delay: ${Math.random() * 0.3}s;
        `;
        body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }
    }

    // Dynamic keyframe for confetti burst
    const burstStyle = document.createElement('style');
    burstStyle.textContent = `
      @keyframes confettiBurst {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
        100% { transform: translate(${Math.random() > 0.5 ? '' : '-'}${200 + Math.random() * 300}px, ${100 + Math.random() * 400}px) rotate(${360 + Math.random() * 720}deg) scale(0); opacity: 0; }
      }
    `;
    document.head.appendChild(burstStyle);

    // === Letter ===
    function openLetter() {
      document.getElementById('envelopeOverlay').classList.add('show');
    }
    function closeLetter(e) {
      if (e && e.target !== document.getElementById('envelopeOverlay')) return;
      document.getElementById('envelopeOverlay').classList.remove('show');
    }

    // === Toast ===
    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    // === Music ===
    let audioCtx = null;
    function playMusic(e) {
      e.stopPropagation();
      if (audioCtx) {
        playMelody();
        return;
      }
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      playMelody();
    }

    function playMelody() {
      const notes = [
        { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 440, d: 0.38 },{ f: 392, d: 0.38 },{ f: 523, d: 0.38 },{ f: 494, d: 0.55 },
        { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 440, d: 0.38 },{ f: 392, d: 0.38 },{ f: 587, d: 0.38 },{ f: 523, d: 0.55 },
        { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 784, d: 0.38 },{ f: 659, d: 0.38 },{ f: 523, d: 0.38 },{ f: 494, d: 0.38 },{ f: 440, d: 0.55 },
        { f: 698, d: 0.28 },{ f: 698, d: 0.18 },{ f: 659, d: 0.38 },{ f: 523, d: 0.38 },{ f: 587, d: 0.38 },{ f: 523, d: 0.7 },
      ];
      let t = audioCtx.currentTime;
      notes.forEach(({ f, d }) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + d);
        t += d + 0.04;
      });

      const hint = document.querySelector('.audio-hint');
      hint.textContent = '🎵 生日快乐歌正在播放 ~ ♪';
      setTimeout(() => { hint.textContent = '🎵 再点一次重播生日歌'; }, 15000);
    }
  </script>
</body>
</html>

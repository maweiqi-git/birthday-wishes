<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笑笑，生日快乐</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(170deg, #fef9f0 0%, #fdf3e0 30%, #fef7ed 60%, #faf0e0 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* Warm light particles */
    #particleCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
      width: 100%;
    }

    /* Name */
    .name {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 700;
      color: #5c3d2e;
      letter-spacing: 8px;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
    }

    /* Greeting */
    .greeting {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: #b8956a;
      letter-spacing: 6px;
      margin-bottom: 36px;
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.25s;
    }

    /* Divider */
    .line {
      width: 30px;
      height: 1px;
      background: #d4b896;
      margin: 0 auto 36px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.5s;
    }

    /* Message */
    .message {
      color: #8b7355;
      font-size: 1rem;
      line-height: 2.4;
      letter-spacing: 1px;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.75s;
    }

    /* Candle */
    .candle-section {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 1.1s;
    }
    .candle-tip {
      font-size: 0.75rem;
      color: #c4a882;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .candle-group {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .flame-wrap {
      width: 22px;
      height: 32px;
      margin-bottom: -2px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .flame-wrap.out {
      opacity: 0;
      transform: scale(0.4) translateY(10px);
    }
    .flame-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .flame-core {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 16px;
      background: radial-gradient(ellipse at center, #fff 10%, #ffe082 50%, #ff9800 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.25s ease-in-out infinite alternate;
    }
    .flame-halo {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 26px;
      background: radial-gradient(ellipse at center, rgba(255, 193, 7, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: haloPulse 1.8s ease-in-out infinite;
    }
    @keyframes flicker {
      from { transform: translateX(-50%) rotate(-3deg) scaleY(0.9); }
      to { transform: translateX(-50%) rotate(3deg) scaleY(1.05); }
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.25); }
    }
    .candle-stick {
      width: 4px;
      height: 54px;
      background: linear-gradient(180deg, #faf5ef 0%, #e8d5c0 50%, #c8a878 100%);
      border-radius: 2px;
      transition: opacity 0.6s ease;
    }
    .candle-stick.out {
      opacity: 0.25;
    }
    .candle-foot {
      width: 18px;
      height: 5px;
      background: rgba(180, 140, 100, 0.3);
      border-radius: 50%;
      margin-top: 2px;
    }

    /* Overlay after blow */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .overlay.show { display: flex; }
    .overlay-card {
      background: #fffbf5;
      border-radius: 8px;
      padding: 44px 32px;
      text-align: center;
      max-width: 340px;
      width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      animation: fadeUp 0.5s ease;
    }
    .overlay-card h2 {
      font-size: 1.5rem;
      color: #5c3d2e;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .overlay-card p {
      color: #8b7355;
      font-size: 0.9rem;
      line-height: 2;
      margin-bottom: 24px;
    }
    .overlay-card button {
      background: #5c3d2e;
      color: #fef9f0;
      border: none;
      padding: 10px 32px;
      border-radius: 50px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 2px;
      transition: background 0.3s;
    }
    .overlay-card button:hover {
      background: #7b5b4c;
    }

    /* Music */
    .music-btn {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 18px;
      border-radius: 50px;
      background: rgba(92, 61, 46, 0.06);
      transition: background 0.3s;
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      animation-delay: 1.5s;
    }
    .music-btn:hover {
      background: rgba(92, 61, 46, 0.1);
    }
    .music-ring {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid #b8956a;
      transition: all 0.3s;
    }
    .music-btn.on .music-ring {
      background: #b8956a;
      box-shadow: 0 0 6px rgba(184, 149, 106, 0.4);
      animation: ringPulse 1.5s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 4px rgba(184, 149, 106, 0.3); }
      50% { box-shadow: 0 0 12px rgba(184, 149, 106, 0.5); }
    }
    .music-label {
      font-size: 0.7rem;
      color: #b8956a;
      letter-spacing: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .name { font-size: 2.6rem; letter-spacing: 4px; }
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="container">
    <h1 class="name">笑笑</h1>
    <p class="greeting">生 日 快 乐</p>
    <div class="line"></div>

    <p class="message">
      三十六岁，是最好的年纪<br>
      愿你永远笑得像名字一样灿烂<br>
      每一天都被阳光和温柔填满
    </p>

    <div class="candle-section">
      <p class="candle-tip">轻触烛火 · 许个愿</p>
      <div class="candle-group" id="candleGroup" onclick="blow(event)">
        <div class="flame-wrap" id="flameWrap">
          <div class="flame-inner">
            <div class="flame-halo"></div>
            <div class="flame-core"></div>
          </div>
        </div>
        <div class="candle-stick" id="candleStick"></div>
        <div class="candle-foot"></div>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="overlay-card" onclick="event.stopPropagation()">
      <h2>笑笑，生日快乐</h2>
      <p>愿你所想，皆如所愿<br>新的一岁，更加闪闪发光</p>
      <button onclick="closeOverlay()">合十许愿</button>
    </div>
  </div>

  <!-- Music -->
  <div class="music-btn on" id="musicBtn" onclick="toggleMusic(event)" title="音乐">
    <div class="music-ring"></div>
    <span class="music-label" id="musicLabel">MUSIC</span>
  </div>

  <script>
    // === Canvas warm particles ===
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, pts = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Pt {
      constructor() { this.reset(); this.y = Math.random() * H; }
      reset() {
        this.x = Math.random() * W;
        this.y = H + 10;
        this.r = Math.random() * 1.8 + 0.4;
        this.v = Math.random() * 0.35 + 0.08;
        this.a = Math.random() * 0.55 + 0.08;
        this.wx = Math.random() * 0.4;
        this.ws = Math.random() * 0.015 + 0.004;
        this.wo = Math.random() * Math.PI * 2;
      }
      step() {
        this.y -= this.v;
        this.x += Math.sin(this.y * this.ws + this.wo) * this.wx;
        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,160,110,${this.a})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 70; i++) pts.push(new Pt());

    (function loop() {
      ctx.clearRect(0, 0, W, H);
      pts.forEach(p => { p.step(); p.draw(); });
      requestAnimationFrame(loop);
    })();

    // === Candle ===
    let blown = false;
    function blow(e) {
      e.stopPropagation();
      if (blown) return;
      blown = true;
      document.getElementById('flameWrap').classList.add('out');
      document.getElementById('candleStick').classList.add('out');
      document.getElementById('overlay').classList.add('show');
    }

    function closeOverlay(e) {
      if (e && e.target !== document.getElementById('overlay') && !e.target.matches('button')) return;
      document.getElementById('overlay').classList.remove('show');
    }

    // === Music loop ===
    let ctxA = null, musicOn = true, loopId = null;
    const DUR = 15000;
    const notes = [
      {f:392,d:.28},{f:392,d:.18},{f:440,d:.38},{f:392,d:.38},{f:523,d:.38},{f:494,d:.55},
      {f:392,d:.28},{f:392,d:.18},{f:440,d:.38},{f:392,d:.38},{f:587,d:.38},{f:523,d:.55},
      {f:392,d:.28},{f:392,d:.18},{f:784,d:.38},{f:659,d:.38},{f:523,d:.38},{f:494,d:.38},{f:440,d:.55},
      {f:698,d:.28},{f:698,d:.18},{f:659,d:.38},{f:523,d:.38},{f:587,d:.38},{f:523,d:.7},
    ];

    function play() {
      if (!ctxA || !musicOn) return;
      const t = ctxA.currentTime;
      notes.forEach(({f,d}) => {
        const o = ctxA.createOscillator();
        const g = ctxA.createGain();
        o.type = 'triangle';
        o.frequency.value = f;
        g.gain.setValueAtTime(0.16, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + d);
        o.connect(g); g.connect(ctxA.destination);
        o.start(t); o.stop(t + d);
        t += d + 0.04;
      });
      loopId = setTimeout(play, DUR);
    }

    function init() { if (!ctxA) ctxA = new (window.AudioContext||window.webkitAudioContext)(); }

    function start() { init(); musicOn = true; updateUI(); play(); }
    function stop() { musicOn = false; clearTimeout(loopId); updateUI(); }

    function toggleMusic(e) {
      e.stopPropagation();
      init();
      musicOn ? stop() : start();
    }

    function updateUI() {
      const b = document.getElementById('musicBtn');
      const l = document.getElementById('musicLabel');
      if (musicOn) { b.classList.add('on'); l.textContent = 'MUSIC'; }
      else { b.classList.remove('on'); l.textContent = 'OFF'; }
    }

    window.addEventListener('DOMContentLoaded', () => {
      init();
      if (ctxA.state === 'running') start();
      else {
        function wake() {
          if (musicOn) return;
          ctxA.resume().then(start);
          ['click','touchstart','keydown'].forEach(e => document.removeEventListener(e, wake));
        }
        ['click','touchstart','keydown'].forEach(e => document.addEventListener(e, wake));
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Noto Serif SC', 'Playfair Display', 'STSong', 'SimSun', serif;
      overflow: hidden;
      cursor: default;
    }

    /* Canvas for subtle particles */
    #particleCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    /* Date */
    .date {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(200, 170, 120, 0.6);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
    }

    /* Main greeting */
    .greeting {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 700;
      color: #f0e6d8;
      line-height: 1.2;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.3s;
    }
    .greeting .accent {
      color: #c8a878;
      font-style: italic;
    }

    .sub {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: rgba(200, 170, 120, 0.5);
      letter-spacing: 4px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.6s;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(200, 170, 120, 0.4);
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 0.9s;
    }

    /* Wish card */
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      padding: 36px 28px;
      margin-bottom: 48px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.2s;
    }
    .card p {
      color: rgba(240, 230, 216, 0.7);
      font-size: 0.95rem;
      line-height: 2.4;
      letter-spacing: 1px;
    }

    /* Candle section */
    .candle-section {
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.5s;
    }

    .candle-hint {
      font-size: 0.75rem;
      color: rgba(200, 170, 120, 0.4);
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    /* Single candle */
    .candle-wrapper {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
    }
    .candle-body {
      width: 4px;
      height: 60px;
      background: linear-gradient(180deg, #f5f0eb 0%, #e8d5c0 40%, #c8a878 100%);
      border-radius: 2px;
      transition: opacity 0.6s ease;
    }
    .candle-body.blown {
      opacity: 0.2;
    }
    .flame-container {
      position: relative;
      width: 24px;
      height: 36px;
      margin-bottom: -4px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .flame-container.blown {
      opacity: 0;
      transform: scale(0.5) translateY(8px);
    }
    .flame-core {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 16px;
      background: radial-gradient(ellipse at center, #fff 10%, #f5d78c 50%, #e8963a 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.2s ease-in-out infinite alternate;
    }
    .flame-glow {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 28px;
      background: radial-gradient(ellipse at center, rgba(245, 215, 140, 0.4) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 1.5s ease-in-out infinite;
    }
    @keyframes flicker {
      from { transform: translateX(-50%) rotate(-2deg) scaleY(0.92); }
      to { transform: translateX(-50%) rotate(2deg) scaleY(1.06); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    }

    .candle-base {
      width: 20px;
      height: 6px;
      background: rgba(200, 170, 120, 0.3);
      border-radius: 50%;
      margin-top: 2px;
    }

    /* Music control */
    .music-ctrl {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards;
      animation-delay: 1.8s;
    }
    .music-ctrl:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.14);
    }
    .music-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(200, 170, 120, 0.4);
      transition: background 0.3s;
    }
    .music-ctrl.playing .music-dot {
      background: #c8a878;
      box-shadow: 0 0 6px rgba(200, 170, 120, 0.4);
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 4px rgba(200, 170, 120, 0.3); }
      50% { box-shadow: 0 0 10px rgba(200, 170, 120, 0.6); }
    }
    .music-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: rgba(200, 170, 120, 0.5);
      transition: color 0.3s;
    }

    /* Surprise overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .overlay.show { display: flex; }
    .overlay-content {
      background: #141414;
      border: 1px solid rgba(200, 170, 120, 0.15);
      border-radius: 4px;
      padding: 48px 36px;
      text-align: center;
      max-width: 360px;
      width: 90vw;
      animation: fadeUp 0.6s ease;
    }
    .overlay-content h2 {
      font-size: 1.6rem;
      color: #f0e6d8;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .overlay-content p {
      color: rgba(240, 230, 216, 0.6);
      font-size: 0.9rem;
      line-height: 2;
      margin-bottom: 28px;
    }
    .overlay-close {
      background: none;
      border: 1px solid rgba(200, 170, 120, 0.3);
      color: #c8a878;
      padding: 10px 32px;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 3px;
      transition: all 0.3s;
    }
    .overlay-close:hover {
      background: rgba(200, 170, 120, 0.1);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .greeting { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="container">
    <div class="date">June · 10</div>
    <h1 class="greeting">
      生<span class="accent">日</span>快乐
    </h1>
    <p class="sub">Happy Birthday</p>
    <div class="divider"></div>

    <div class="card">
      <p>
        愿你岁岁平安，事事如意<br>
        愿你眼里有光，心中有爱<br>
        愿所有的美好都如约而至
      </p>
    </div>

    <div class="candle-section">
      <p class="candle-hint">轻触烛火 · 许下心愿</p>
      <div class="candle-wrapper" id="candleWrapper" onclick="blowCandle(event)">
        <div class="flame-container" id="flameContainer">
          <div class="flame-glow"></div>
          <div class="flame-core"></div>
        </div>
        <div class="candle-body" id="candleBody"></div>
        <div class="candle-base"></div>
      </div>
    </div>
  </div>

  <!-- Surprise overlay -->
  <div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="overlay-content" onclick="event.stopPropagation()">
      <h2>许愿吧</h2>
      <p>生日快乐<br>愿你所愿，皆能实现</p>
      <button class="overlay-close" onclick="closeOverlay()">闭上眼睛</button>
    </div>
  </div>

  <!-- Music control -->
  <div class="music-ctrl playing" id="musicCtrl" onclick="toggleMusic(event)" title="音乐开关">
    <div class="music-dot"></div>
    <span class="music-label" id="musicLabel">MUSIC ON</span>
  </div>

  <script>
    // === Canvas Particles ===
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() {
        this.reset();
        this.y = Math.random() * h;
      }
      reset() {
        this.x = Math.random() * w;
        this.y = h + 10;
        this.size = Math.random() * 1.5 + 0.5;
        this.speed = Math.random() * 0.3 + 0.1;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.wobble = Math.random() * 0.3;
        this.wobbleSpeed = Math.random() * 0.02 + 0.005;
        this.wobbleOffset = Math.random() * Math.PI * 2;
      }
      update() {
        this.y -= this.speed;
        this.x += Math.sin(this.y * this.wobbleSpeed + this.wobbleOffset) * this.wobble;
        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,170,120,${this.opacity})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    // === Candle interaction ===
    let candleBlown = false;
    function blowCandle(e) {
      e.stopPropagation();
      if (candleBlown) return;
      candleBlown = true;

      document.getElementById('flameContainer').classList.add('blown');
      document.getElementById('candleBody').classList.add('blown');
      document.getElementById('overlay').classList.add('show');
    }

    // === Overlay ===
    function closeOverlay(e) {
      if (e && e.target !== document.getElementById('overlay') && !e.target.classList.contains('overlay-close')) return;
      document.getElementById('overlay').classList.remove('show');
    }

    // === Music (auto-play loop) ===
    let audioCtx = null;
    let musicOn = true;
    let loopTimer = null;
    const SONG_DURATION = 15000;

    const notes = [
      { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 440, d: 0.38 },{ f: 392, d: 0.38 },{ f: 523, d: 0.38 },{ f: 494, d: 0.55 },
      { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 440, d: 0.38 },{ f: 392, d: 0.38 },{ f: 587, d: 0.38 },{ f: 523, d: 0.55 },
      { f: 392, d: 0.28 },{ f: 392, d: 0.18 },{ f: 784, d: 0.38 },{ f: 659, d: 0.38 },{ f: 523, d: 0.38 },{ f: 494, d: 0.38 },{ f: 440, d: 0.55 },
      { f: 698, d: 0.28 },{ f: 698, d: 0.18 },{ f: 659, d: 0.38 },{ f: 523, d: 0.38 },{ f: 587, d: 0.38 },{ f: 523, d: 0.7 },
    ];

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playMelody() {
      if (!audioCtx || !musicOn) return;
      const t = audioCtx.currentTime;
      notes.forEach(({ f, d }) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + d);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + d);
        t += d + 0.04;
      });
      loopTimer = setTimeout(playMelody, SONG_DURATION);
    }

    function startMusic() {
      initAudio();
      musicOn = true;
      updateMusicUI();
      playMelody();
    }

    function stopMusic() {
      musicOn = false;
      clearTimeout(loopTimer);
      updateMusicUI();
    }

    function toggleMusic(e) {
      e.stopPropagation();
      initAudio();
      if (musicOn) {
        stopMusic();
      } else {
        startMusic();
      }
    }

    function updateMusicUI() {
      const ctrl = document.getElementById('musicCtrl');
      const label = document.getElementById('musicLabel');
      if (musicOn) {
        ctrl.classList.add('playing');
        label.textContent = 'MUSIC ON';
      } else {
        ctrl.classList.remove('playing');
        label.textContent = 'MUSIC OFF';
      }
    }

    // Try auto-play; fallback to first-interaction resume
    window.addEventListener('DOMContentLoaded', function() {
      initAudio();
      if (audioCtx.state === 'running') {
        startMusic();
      } else {
        function resumeOnInteract() {
          if (musicOn) return;
          audioCtx.resume().then(() => startMusic());
          document.removeEventListener('click', resumeOnInteract);
          document.removeEventListener('touchstart', resumeOnInteract);
          document.removeEventListener('keydown', resumeOnInteract);
        }
        document.addEventListener('click', resumeOnInteract);
        document.addEventListener('touchstart', resumeOnInteract);
        document.addEventListener('keydown', resumeOnInteract);
      }
    });
  </script>
</body>
</html>
